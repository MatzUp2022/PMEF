name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          stale-issue-message: >
            This issue has been inactive for 90 days. It will be closed in 14 days
            unless there is further activity. If this is still relevant, please
            leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. If this is still relevant, please reopen
            and add context about current status.
          days-before-issue-stale: 90
          days-before-issue-close: 14

          # PRs
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed
            in 7 days unless there is activity. If you are still working on this,
            please leave a comment or push an update.
          close-pr-message: >
            Closing due to inactivity. Please reopen when ready.
          days-before-pr-stale: 30
          days-before-pr-close: 7

          # Never stale these
          exempt-issue-labels: 'RFC,pinned,security,good first issue,help wanted'
          exempt-pr-labels: 'RFC,pinned,security'

          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
