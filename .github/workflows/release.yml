name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v1.0.0, v1.0.0-rc, v1.1.0-beta.1

permissions:
  contents: write
  packages: write

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Run full validation before releasing
  # ──────────────────────────────────────────────────────────
  validate:
    name: Full validation
    uses: ./.github/workflows/validate-schemas.yml

  # ──────────────────────────────────────────────────────────
  # 2. Build distribution artefacts
  # ──────────────────────────────────────────────────────────
  build-artifacts:
    name: Build release artefacts
    runs-on: ubuntu-latest
    needs: validate
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jsonschema

      - name: Build schema bundle (single-file)
        run: python scripts/bundle-schemas.py --output "dist/pmef-schemas-${REF_NAME}.json"

      - name: Build specification PDF
        run: python scripts/build-spec-pdf.py --output "dist/pmef-spec-${REF_NAME}.pdf"
        continue-on-error: true   # PDF build is best-effort

      - name: Create schema ZIP
        run: |
          cd schemas
          zip -r "../dist/pmef-schemas-${REF_NAME}.zip" .
          cd ..

      - name: Create examples ZIP
        run: |
          cd examples
          zip -r "../dist/pmef-examples-${REF_NAME}.zip" .
          cd ..

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artefacts
          path: dist/

  # ──────────────────────────────────────────────────────────
  # 3. Create GitHub Release
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-artifacts
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: release-artefacts
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          python scripts/extract-changelog.py \
            --version "${REF_NAME}" \
            --output /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/pmef-schemas-*.zip
            dist/pmef-schemas-*.json
            dist/pmef-examples-*.zip
            dist/pmef-spec-*.pdf
          fail_on_unmatched_files: false
